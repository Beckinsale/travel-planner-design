<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelPlanner</title>

    <!-- React & ReactDOM -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                400: '#38bdf8',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
              },
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      };
    </script>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: 'Inter', sans-serif;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }

      .map-bg {
        background-color: #f8fafc;
        background-image: radial-gradient(#e2e8f0 1.5px, transparent 1.5px);
        background-size: 24px 24px;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes floatEffect {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      .pin-float {
        animation: floatEffect 4s ease-in-out infinite;
      }
    </style>
  </head>
  <body class="bg-white text-slate-900 antialiased min-h-screen flex flex-col">
    <div id="root" class="flex flex-col min-h-screen"></div>

    <script type="text/babel">
      const { useState } = React;

      // --- Icons Dictionary ---
      const LucideIcons = {
        MapPin: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
            <circle cx="12" cy="10" r="3" />
          </svg>
        ),
        Map: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21" />
            <line x1="9" x2="9" y1="3" y2="18" />
            <line x1="15" x2="15" y1="6" y2="21" />
          </svg>
        ),
        Calendar: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
            <line x1="16" x2="16" y1="2" y2="6" />
            <line x1="8" x2="8" y1="2" y2="6" />
            <line x1="3" x2="21" y1="10" y2="10" />
          </svg>
        ),
        Users: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
        ),
        ArrowLeft: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="m12 19-7-7 7-7" />
            <path d="M19 12H5" />
          </svg>
        ),
        Plus: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M5 12h14" />
            <path d="M12 5v14" />
          </svg>
        ),
        Hotel: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M3 21h18M3 7v1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7M4 21v-11m16 11v-11M12 21V12" />
          </svg>
        ),
        Utensils: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2" />
            <path d="M7 2v20" />
            <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />
          </svg>
        ),
        Landmark: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <line x1="3" x2="21" y1="22" y2="22" />
            <line x1="6" x2="6" y1="18" y2="11" />
            <line x1="10" x2="10" y1="18" y2="11" />
            <line x1="14" x2="14" y1="18" y2="11" />
            <line x1="18" x2="18" y1="18" y2="11" />
            <polygon points="12 2 20 7 4 7" />
          </svg>
        ),
        Mail: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <rect width="20" height="16" x="2" y="4" rx="2" />
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
          </svg>
        ),
        Search: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
        ),
        Plane: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3.5c-.5-.5-2.5 0-4 1.5L13.5 8.5 5.3 6.7c-1.1-.3-1.9.1-1.8.9l2.2 9.3L2.7 20.1c-.4.4-.3 1.1.1 1.5s1.1.5 1.5.1L7.4 18.6l9.3 2.2c.8.1 1.2-.7.9-1.6Z" />
          </svg>
        ),
        Target: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <circle cx="12" cy="12" r="6" />
            <circle cx="12" cy="12" r="2" />
          </svg>
        ),
        Sliders: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <line x1="4" x2="4" y1="21" y2="14" />
            <line x1="4" x2="4" y1="10" y2="3" />
            <line x1="12" x2="12" y1="21" y2="12" />
            <line x1="12" x2="12" y1="8" y2="3" />
            <line x1="20" x2="20" y1="21" y2="16" />
            <line x1="20" x2="20" y1="12" y2="3" />
            <line x1="1" x2="7" y1="14" y2="14" />
            <line x1="9" x2="15" y1="8" y2="8" />
            <line x1="17" x2="23" y1="16" y2="16" />
          </svg>
        ),
      };

      const Icon = ({ name, size = 20, className }) => {
        const IconComponent = LucideIcons[name];
        if (!IconComponent) return null;
        return (
          <IconComponent width={size} height={size} className={className} />
        );
      };

      const STEPS = [
        {
          id: 1,
          title: 'Задай параметры',
          desc: 'Введи бюджет, город отправления, даты и количество путешественников.',
          icon: 'Target',
        },
        {
          id: 2,
          title: 'Собери маршрут',
          desc: 'Система предложит варианты или ты соберёшь маршрут вручную из точек.',
          icon: 'Sliders',
        },
        {
          id: 3,
          title: 'Визуализируй',
          desc: 'Все точки появятся на интерактивной карте с таймлайном и бюджетом.',
          icon: 'Map',
        },
        {
          id: 4,
          title: 'Бронируй',
          desc: 'Когда план готов, переходи по ссылкам к сервисам для бронирования.',
          icon: 'Plane',
        },
      ];

      const FAQ_CARDS = [
        {
          id: 1,
          title: 'Как работает сервис рекомендаций?',
          desc: 'Наш AI анализирует тысячи направлений, учитывая ваш бюджет и интересы. Просто укажите сумму, и мы покажем, куда можно улететь и хорошо отдохнуть.',
          image:
            'https://images.unsplash.com/photo-1524850011238-e3d235c7d4c9?q=80&w=2064&auto=format&fit=crop',
        },
        {
          id: 2,
          title: 'Можно ли путешествовать с детьми?',
          desc: "Конечно! В настройках можно включить фильтр 'Семейный отдых'. Мы подберем отели с детскими клубами и маршруты без сложных пересадок.",
          image:
            'https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=2070&auto=format&fit=crop',
        },
        {
          id: 3,
          title: 'Какие страны доступны?',
          desc: 'Мы работаем с глобальными базами данных авиабилетов и отелей. Вы можете спланировать путешествие практически в любую точку мира, от Азии до Латинской Америки.',
          image:
            'https://images.unsplash.com/photo-1503220317375-aaad61436b1b?q=80&w=2070&auto=format&fit=crop',
        },
        {
          id: 4,
          title: 'Сервис бесплатный?',
          desc: 'Базовое планирование полностью бесплатно. У нас есть PRO-подписка для сложных мульти-маршрутов и сохранения истории поездок в облаке.',
          image:
            'https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=2071&auto=format&fit=crop',
        },
      ];

      function App() {
        const [view, setView] = useState('landing');
        const [scenario, setScenario] = useState('manual');

        return (
          <div className="flex flex-col min-h-screen">
            <nav className="sticky top-0 z-50 bg-white/95 backdrop-blur-xl border-b border-slate-100">
              <div className="max-w-4xl mx-auto px-4 md:px-6 h-16 flex justify-between items-center">
                <div
                  className="flex items-center gap-2 cursor-pointer"
                  onClick={() => setView('landing')}
                >
                  <div className="bg-brand-500 text-white p-1.5 rounded-lg">
                    <Icon name="Map" size={20} />
                  </div>
                  <span className="font-bold text-lg text-slate-800 tracking-tight">
                    TravelPlanner
                  </span>
                </div>
                <button className="text-sm font-medium text-slate-600 hover:text-brand-600 transition-all px-3 py-1.5 rounded-lg hover:bg-slate-50">
                  Войти
                </button>
              </div>
            </nav>

            <main className="flex-1 overflow-x-hidden">
              {view === 'landing' ? (
                <LandingPage
                  scenario={scenario}
                  setScenario={setScenario}
                  onStart={() => setView('planner')}
                />
              ) : (
                <PlannerPage onBack={() => setView('landing')} />
              )}
            </main>

            <Footer />
          </div>
        );
      }

      function LandingPage({ scenario, setScenario, onStart }) {
        return (
          <div className="relative">
            <div className="absolute top-0 left-0 w-full h-[800px] -z-10 bg-gradient-to-b from-blue-100 via-blue-50/30 to-transparent pointer-events-none"></div>

            <div className="max-w-4xl mx-auto px-4 md:px-6 pt-6 md:pt-32 pb-10 md:pb-20">
              {/* SVG Area */}
              <div className="flex justify-center mb-6 md:mb-12 h-auto max-w-full overflow-visible">
                <div className="w-full max-w-[500px]">
                  <svg
                    width="500"
                    height="160"
                    viewBox="0 0 500 160"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                    className="drop-shadow-xl overflow-visible w-full h-auto"
                  >
                    <path
                      d="M 60 120 Q 250 20 440 60"
                      stroke="white"
                      strokeWidth="3"
                      strokeDasharray="8 8"
                      strokeLinecap="round"
                      fill="none"
                      style={{ opacity: 0.8 }}
                    ></path>
                    <g transform="translate(60, 120)">
                      <path
                        d="M0 0 C-10 -12 -15 -20 -15 -28 A 15 15 0 1 1 15 -28 C 15 -20 10 -12 0 0 Z"
                        fill="white"
                      ></path>
                      <circle cx="0" cy="-28" r="5" fill="#0ea5e9"></circle>
                      <text
                        x="-35"
                        y="-20"
                        fill="white"
                        fontWeight="bold"
                        fontSize="24"
                        fontFamily="Arial"
                      >
                        А
                      </text>
                    </g>
                    <g transform="translate(440, 60)">
                      <path
                        d="M0 0 C-10 -12 -15 -20 -15 -28 A 15 15 0 1 1 15 -28 C 15 -20 10 -12 0 0 Z"
                        fill="white"
                      ></path>
                      <circle cx="0" cy="-28" r="5" fill="#0ea5e9"></circle>
                      <text
                        x="25"
                        y="-20"
                        fill="white"
                        fontWeight="bold"
                        fontSize="24"
                        fontFamily="Arial"
                      >
                        Б
                      </text>
                    </g>
                    <g transform="translate(270, 51) rotate(83) scale(2.5)">
                      <path
                        d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5v1.5l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"
                        fill="white"
                        transform="translate(-11, -11)"
                      ></path>
                    </g>
                  </svg>
                </div>
              </div>

              <div className="flex flex-col">
                {/* Slogan */}
                <div className="text-center mb-6 md:mb-0 order-1">
                  <h1 className="text-2xl sm:text-3xl md:text-5xl font-extrabold text-slate-900 mb-4 md:mb-6 leading-tight">
                    Спланируй <span className="text-brand-500">идеальное</span>{' '}
                    путешествие <br className="hidden md:block" />
                    за минуты
                  </h1>
                  <p className="hidden md:block text-slate-500 text-xl max-w-2xl mx-auto mb-10">
                    Введи бюджет, выбери стиль планирования — и получи готовый
                    маршрут с перелётами, отелями и активностями.
                  </p>
                </div>

                {/* Search Form */}
                <div className="bg-white rounded-2xl md:rounded-3xl shadow-xl shadow-slate-200/60 border border-slate-100 p-2 mb-6 md:mb-20 order-2">
                  <div className="flex p-1 bg-slate-50 rounded-xl md:rounded-2xl mb-4 md:mb-6 mx-1 md:mx-4 mt-1 md:mt-4 overflow-x-auto no-scrollbar">
                    {['manual', 'random', 'ai'].map((s) => (
                      <button
                        key={s}
                        onClick={() => setScenario(s)}
                        className={`flex-1 py-2 px-3 md:px-0 whitespace-nowrap rounded-lg md:rounded-xl text-xs md:text-sm font-bold transition-all ${scenario === s ? 'bg-brand-500 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}
                      >
                        {s === 'manual'
                          ? 'Ручной'
                          : s === 'random'
                            ? 'Рекомендация'
                            : 'AI Ассистент'}
                      </button>
                    ))}
                  </div>

                  <div className="flex flex-col md:flex-row gap-2 md:gap-4 px-2 md:px-4 pb-4 md:pb-6 items-center">
                    <div className="w-full md:flex-1 relative group">
                      <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-brand-500 transition-colors">
                        <Icon name="MapPin" size={18} />
                      </div>
                      <input
                        type="text"
                        placeholder="Откуда"
                        className="w-full pl-11 pr-4 py-3.5 bg-slate-50 rounded-xl md:rounded-2xl border-none focus:ring-2 focus:ring-brand-200 outline-none text-slate-800 font-medium text-sm md:text-base"
                      />
                    </div>
                    <div className="w-full md:flex-1 relative group">
                      <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-brand-500 transition-colors">
                        <Icon name="Calendar" size={18} />
                      </div>
                      <input
                        type="text"
                        placeholder="Даты"
                        className="w-full pl-11 pr-4 py-3.5 bg-slate-50 rounded-xl md:rounded-2xl border-none focus:ring-2 focus:ring-brand-200 outline-none text-slate-800 font-medium text-sm md:text-base"
                      />
                    </div>
                    <div className="w-full md:w-44 relative group">
                      <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-brand-500 z-10 pointer-events-none transition-colors">
                        <Icon name="Users" size={18} />
                      </div>
                      <select
                        defaultValue="1 человек"
                        className="w-full pl-11 pr-10 py-3.5 bg-slate-50 rounded-xl md:rounded-2xl border-none focus:ring-2 focus:ring-brand-200 outline-none text-slate-800 font-medium text-sm md:text-base appearance-none cursor-pointer"
                      >
                        <option>1 человек</option>
                        <option>2 человека</option>
                        <option>3 человека</option>
                        <option>4 человека</option>
                        <option>Группа 5+</option>
                      </select>
                      <div className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                        <svg
                          width="10"
                          height="10"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          strokeWidth="3"
                        >
                          <path d="m6 9 6 6 6-6" />
                        </svg>
                      </div>
                    </div>
                    <button
                      onClick={onStart}
                      className="w-full md:w-auto md:min-w-[140px] md:shrink-0 px-8 h-12 md:h-14 bg-brand-500 hover:bg-brand-600 text-white rounded-xl md:rounded-2xl flex items-center justify-center shadow-lg shadow-brand-500/30 transition-all active:scale-95 text-base font-bold uppercase tracking-wide"
                    >
                      Начать
                    </button>
                  </div>
                </div>

                <div className="md:hidden text-center mb-10 order-3 px-4">
                  <p className="text-slate-500 text-sm sm:text-base leading-relaxed">
                    Введи бюджет, выбери стиль планирования — и получи готовый
                    маршрут с перелётами, отелями и активностями.
                  </p>
                </div>
              </div>

              {/* Process Section */}
              <div className="mb-16 md:mb-24">
                <div className="text-center mb-8 md:mb-12">
                  <h3 className="text-xs md:text-sm font-bold text-brand-500 uppercase tracking-widest mb-2">
                    Процесс
                  </h3>
                  <h2 className="text-2xl md:text-4xl font-bold text-slate-900">
                    Как это работает
                  </h2>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 md:gap-8 px-2 md:px-0 relative">
                  <div className="hidden md:block absolute top-12 left-[12%] right-[12%] h-0.5 bg-slate-100 -z-10"></div>
                  {STEPS.map((step) => (
                    <div
                      key={step.id}
                      className="flex flex-col items-center text-center p-6 md:p-0 bg-white md:bg-transparent rounded-2xl md:rounded-none border border-slate-100 md:border-none shadow-lg shadow-slate-200/40 md:shadow-none transition-transform"
                    >
                      <div className="w-14 h-14 md:w-24 md:h-24 bg-white rounded-2xl md:rounded-3xl shadow-sm border border-slate-100 flex items-center justify-center mb-4 md:mb-6 relative z-10">
                        <div className="absolute -top-2 -right-2 w-6 h-6 md:w-8 md:h-8 bg-brand-500 rounded-full text-white flex items-center justify-center font-bold text-xs md:text-sm border-2 md:border-4 border-white">
                          {step.id}
                        </div>
                        <div className="text-brand-600">
                          <Icon
                            name={step.icon}
                            size={28}
                            className="md:w-10 md:h-10"
                          />
                        </div>
                      </div>
                      <h4 className="font-bold text-slate-900 text-base md:text-lg mb-2">
                        {step.title}
                      </h4>
                      <p className="text-slate-500 text-[13px] md:text-sm leading-relaxed">
                        {step.desc}
                      </p>
                    </div>
                  ))}
                </div>
              </div>

              {/* FAQ Section */}
              <div className="grid grid-cols-1 gap-6 md:gap-12">
                {FAQ_CARDS.map((card, idx) => (
                  <div
                    key={card.id}
                    className={`flex flex-col md:flex-row bg-white rounded-2xl md:rounded-[2rem] overflow-hidden shadow-lg shadow-slate-200/50 border border-slate-100 ${idx % 2 !== 0 ? 'md:flex-row-reverse' : ''}`}
                  >
                    <div className="w-full md:w-1/2 h-48 sm:h-64 md:h-auto relative overflow-hidden">
                      <img
                        src={card.image}
                        alt={card.title}
                        className="absolute inset-0 w-full h-full object-cover"
                      />
                    </div>
                    <div className="w-full md:w-1/2 p-6 md:p-12 flex flex-col justify-center">
                      <h4 className="text-lg md:text-3xl font-bold text-slate-800 mb-3">
                        {card.title}
                      </h4>
                      <p className="text-slate-600 leading-relaxed text-sm md:text-lg">
                        {card.desc}
                      </p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      function PlannerPage({ onBack }) {
        const categories = [
          { id: 'city', label: 'Город', icon: 'MapPin' },
          { id: 'hotel', label: 'Отель', icon: 'Hotel' },
          { id: 'food', label: 'Где поесть', icon: 'Utensils' },
          { id: 'museum', label: 'Места', icon: 'Landmark' },
          { id: 'transport', label: 'Транспорт', icon: 'Plane' },
        ];

        return (
          <div className="bg-white">
            {/* Consistent Width Container */}
            <div className="max-w-4xl mx-auto px-4 md:px-6 py-6 md:py-10">
              {/* Header Area */}
              <button
                onClick={onBack}
                className="text-slate-400 hover:text-slate-600 mb-4 flex items-center gap-1 text-sm font-medium transition-colors"
              >
                <Icon name="ArrowLeft" size={16} /> Назад
              </button>

              <h2 className="text-2xl md:text-4xl font-extrabold text-slate-900 leading-tight mb-1">
                Моё путешествие
              </h2>
              <p className="text-slate-400 text-sm md:text-base flex items-center gap-2 font-medium mb-10">
                <Icon name="Calendar" size={16} /> 15 Окт — 20 Окт (5 дней)
              </p>

              {/* Categories Chips: Fully aligned and non-scrolling on desktop */}
              <div className="mb-10 overflow-x-auto md:overflow-x-visible no-scrollbar -mx-4 px-4 md:mx-0 md:px-0">
                <div className="flex md:grid md:grid-cols-5 gap-3 md:gap-4 min-w-max md:min-w-0 pb-2">
                  {categories.map((cat) => (
                    <div
                      key={cat.id}
                      className="flex-1 flex items-center justify-between gap-2 p-3 px-4 bg-white border border-slate-100 rounded-2xl shadow-sm hover:border-brand-500 transition-all cursor-pointer group shrink-0"
                    >
                      <div className="flex items-center gap-2 overflow-hidden">
                        <div className="p-1.5 md:p-2 bg-slate-50 group-hover:bg-brand-50 rounded-xl text-slate-500 group-hover:text-brand-500 transition-colors shrink-0">
                          <Icon name={cat.icon} size={18} />
                        </div>
                        <span className="font-bold text-[13px] text-slate-700 truncate shrink-0">
                          {cat.label}
                        </span>
                      </div>
                      <div className="w-5 h-5 md:w-6 md:h-6 rounded-full bg-brand-500 text-white flex items-center justify-center shadow-sm shrink-0 transition-transform active:scale-90 ml-1">
                        <Icon name="Plus" size={12} className="shrink-0" />
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Uniform Search Block */}
              <div className="mb-10">
                <div className="flex flex-col md:flex-row gap-3 items-center">
                  <div className="w-full md:flex-1 relative group">
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-brand-500 transition-colors">
                      <Icon name="Search" size={18} />
                    </div>
                    <input
                      type="text"
                      placeholder="Поиск города или места..."
                      className="w-full pl-11 pr-4 py-4 bg-slate-50 rounded-xl md:rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-brand-200 outline-none text-slate-800 font-medium text-sm md:text-base"
                    />
                  </div>
                  <button className="w-full md:w-auto md:min-w-[150px] md:shrink-0 h-14 px-8 bg-brand-500 hover:bg-brand-600 text-white rounded-xl md:rounded-2xl font-bold uppercase tracking-wide shadow-lg shadow-brand-500/30 active:scale-95 transition-all text-sm md:text-base">
                    СОЗДАТЬ
                  </button>
                </div>
              </div>

              {/* Schematic Map View (Reduced Bottom Margin) */}
              <div className="w-full mb-6 md:mb-10">
                <div className="w-full aspect-[16/11] md:aspect-[21/9] rounded-[2.5rem] overflow-hidden relative border border-slate-200 shadow-inner map-bg group">
                  <div className="absolute inset-0 flex items-center justify-center pointer-events-none px-4">
                    <div className="text-center transform transition-transform group-hover:scale-105 pointer-events-auto">
                      <div className="w-14 h-14 bg-brand-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-xl animate-bounce border-4 border-white">
                        <Icon name="Map" size={28} />
                      </div>
                      <h3 className="text-lg md:text-2xl font-black text-slate-400 uppercase tracking-[0.2em] select-none">
                        КАРТА МАРШРУТА
                      </h3>
                      <p className="text-xs md:text-sm text-slate-400 mt-2 font-medium max-w-[280px] mx-auto text-center leading-relaxed">
                        Маршрут появится после добавления первой точки.
                      </p>
                    </div>
                  </div>
                  <div className="absolute bottom-6 right-6 flex flex-col gap-2">
                    <button className="w-10 h-10 bg-white rounded-xl shadow-lg border border-slate-100 flex items-center justify-center text-slate-600 hover:text-brand-500 transition-all active:scale-90">
                      <Icon name="Plus" size={18} />
                    </button>
                    <button className="w-10 h-10 bg-white rounded-xl shadow-lg border border-slate-100 flex items-center justify-center text-slate-600 hover:text-brand-500 transition-all active:scale-90 font-black">
                      —
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function Footer() {
        return (
          <footer className="border-t border-slate-100 bg-white mt-auto py-8">
            <div className="max-w-4xl mx-auto px-4 md:px-6 flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-left">
              <div className="flex flex-col items-center md:items-start gap-0.5">
                <span className="font-bold text-lg text-slate-900 tracking-tight leading-tight">
                  TravelPlanner
                </span>
                <span className="text-[10px] md:text-xs text-slate-400 font-medium">
                  Спланируй мечту © 2026
                </span>
              </div>
              <div className="flex gap-8 text-[13px] md:text-sm text-slate-600 font-semibold">
                <a href="#" className="hover:text-brand-600 transition-colors">
                  О сервисе
                </a>
                <a
                  href="#"
                  className="hover:text-brand-600 transition-colors whitespace-nowrap"
                >
                  Контакты
                </a>
              </div>
              <a
                href="mailto:contact@travelplanner.com"
                className="text-slate-400 hover:text-brand-600 transition-all p-2.5 bg-slate-50 rounded-xl hover:bg-brand-50"
              >
                <Icon name="Mail" size={18} />
              </a>
            </div>
          </footer>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
