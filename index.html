<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelPlanner</title>

    <!-- React & ReactDOM -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                400: '#38bdf8',
                500: '#0ea5e9', // Sky Blue branding (Primary)
                600: '#0284c7',
                700: '#0369a1',
              },
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      };
    </script>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: 'Inter', sans-serif;
      }

      /* Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      .map-bg {
        background-color: #f8fafc;
        background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
        background-size: 20px 20px;
      }

      /* Animation for the trajectory line */
      @keyframes flightPath {
        0% {
          stroke-dashoffset: 600;
          opacity: 0;
        }
        20% {
          opacity: 1;
        }
        100% {
          stroke-dashoffset: 0;
        }
      }
      .path-animation {
        stroke-dasharray: 600;
        animation: flightPath 3s ease-in-out forwards;
      }

      /* Floating animation for pins */
      @keyframes floatEffect {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      .pin-float {
        animation: floatEffect 4s ease-in-out infinite;
      }
    </style>
  </head>
  <body class="bg-white text-slate-900 h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // --- Icons Dictionary ---
      const LucideIcons = {
        MapPin: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"

            strokeLinejoin="round"

        ),
        Map: (props) => (
          <svg

            viewBox="0 0 24 24"

        ),
        User: (props) => (

            <circle cx="12" cy="7" r="4" />

        ),
        Sparkles: (props) => (
          <svg

            viewBox="0 0 24 24"

            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"

          </svg>
        ),
        Calendar: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"

          >
            <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
            <line x1="16" x2="16" y1="2" y2="6" />
            <line x1="8" x2="8" y1="2" y2="6" />
            <line x1="3" x2="21" y1="10" y2="10" />

        ),
        Users: (props) => (
          <svg

            stroke="currentColor"

            <circle cx="9" cy="7" r="4" />
            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
        ),
        ArrowRight: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"

            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M5 12h14" />
            <path d="m12 5 7 7-7 7" />
          </svg>
        ),
        Plane: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M2 22h20" />
            <path d="M13 6h7a2 2 0 0 1 2 2v10" />
            <path d="M12 22V6c0-2.2-1.8-4-4-4S4 3.8 4 6v16" />
            <path d="M5.5 5.5 8 8" />
            <path d="M9.5 9.5 12 12" />
          </svg>
        ),
        ArrowLeft: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="m12 19-7-7 7-7" />
            <path d="M19 12H5" />
          </svg>
        ),
        RefreshCcw: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 12" />
            <path d="M3 3v9h9" />
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 12" />
            <path d="M21 21v-9h-9" />

        ),
        Share2: (props) => (
          <svg

            viewBox="0 0 24 24"
            fill="none"

            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <circle cx="18" cy="5" r="3" />
            <circle cx="6" cy="12" r="3" />
            <circle cx="18" cy="19" r="3" />
            <line x1="8.59" x2="15.42" y1="13.51" y2="17.49" />
            <line x1="15.41" x2="8.59" y1="6.51" y2="10.49" />
          </svg>
        ),
        Plus: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M5 12h14" />
            <path d="M12 5v14" />
          </svg>
        ),
        Bed: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M2 4v16" />
            <path d="M2 8h18a2 2 0 0 1 2 2v10" />
            <path d="M2 17h20" />
            <path d="M6 8v9" />
          </svg>
        ),
        Hotel: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M18 2h-3a5 5 0 0 0-5 5v11H6v-5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v5h-4" />
            <path d="M2 22h20" />
            <path d="M10 22v-6.5" />
          </svg>
        ),
        Utensils: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2" />
            <path d="M7 2v20" />
            <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />
          </svg>
        ),
        Save: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
        ),
        Mail: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <rect width="20" height="16" x="2" y="4" rx="2" />
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
          </svg>
        ),
        Target: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <circle cx="12" cy="12" r="6" />
            <circle cx="12" cy="12" r="2" />
          </svg>
        ),
        Sliders: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <line x1="4" x2="4" y1="21" y2="14" />
            <line x1="4" x2="4" y1="10" y2="3" />
            <line x1="12" x2="12" y1="21" y2="12" />
            <line x1="12" x2="12" y1="8" y2="3" />
            <line x1="20" x2="20" y1="21" y2="16" />
            <line x1="20" x2="20" y1="12" y2="3" />
            <line x1="1" x2="7" y1="14" y2="14" />

      // --- Icons Helper ---
      const Icon = ({ name, size = 20, className }) => {
        const IconComponent = LucideIcons[name];
        if (!IconComponent) return null;
        return (
          <IconComponent width={size} height={size} className={className} />
        );
      };

      // --- Data ---
      const STEPS = [
        {
          id: 1,
          title: 'Задай параметры',
          desc: 'Введи бюджет, город отправления, даты и количество путешественников.',
          icon: 'Target',
        },
        {
          id: 2,
          title: 'Собери маршрут',
          desc: 'Система предложит варианты или ты соберёшь маршрут вручную из точек.',
          icon: 'Sliders',
        },
        {
          id: 3,
          title: 'Визуализируй',
          desc: 'Все точки появятся на интерактивной карте с таймлайном и бюджетом.',
          icon: 'Map',
        },
        {
          id: 4,
          title: 'Бронируй',
          desc: 'Когда план готов, переходи по ссылкам к сервисам для бронирования.',
          icon: 'Plane',
        },
      ];

      const FAQ_CARDS = [
        {
          id: 1,
          title: 'Как работает сервис рекомендаций?',
          desc: 'Наш AI анализирует тысячи направлений, учитывая ваш бюджет и интересы. Просто укажите сумму, и мы покажем, куда можно улететь и хорошо отдохнуть.',
          image:
            'https://images.unsplash.com/photo-1524850011238-e3d235c7d4c9?q=80&w=2064&auto=format&fit=crop',
          align: 'left',
        },
        {
          id: 2,
          title: 'Можно ли путешествовать с детьми?',
          desc: "Конечно! В настройках можно включить фильтр 'Семейный отдых'. Мы подберем отели с детскими клубами и маршруты без сложных пересадок.",
          image:
            'https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=2070&auto=format&fit=crop',
          align: 'right',
        },
        {
          id: 3,
          title: 'Какие страны доступны?',
          desc: 'Мы работаем с глобальными базами данных авиабилетов и отелей. Вы можете спланировать путешествие практически в любую точку мира, от Азии до Латинской Америки.',
          image:
            'https://images.unsplash.com/photo-1503220317375-aaad61436b1b?q=80&w=2070&auto=format&fit=crop',
          align: 'left',
        },
        {
          id: 4,
          title: 'Сервис бесплатный?',
          desc: 'Базовое планирование полностью бесплатно. У нас есть PRO-подписка для сложных мульти-маршрутов и сохранения истории поездок в облаке.',
          image:
            'https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=2071&auto=format&fit=crop',
          align: 'right',
        },
      ];

      // --- Main App Component ---
      function App() {
        const [view, setView] = useState('landing');
        const [scenario, setScenario] = useState('manual');

        return (
          <div className="h-full flex flex-col relative bg-white overflow-hidden">
            {/* Navigation Bar */}
            <nav className="w-full z-50 bg-white/95 backdrop-blur-xl border-b border-slate-100 relative shrink-0">
              <div className="max-w-4xl mx-auto px-4 md:px-6 w-full flex justify-between items-center py-3">
                <div
                  className="flex items-center gap-2 cursor-pointer"
                  onClick={() => setView('landing')}
                >
                  <div className="bg-brand-500 text-white p-1 rounded-lg">
                    <Icon name="Map" size={20} />
                  </div>
                  <span className="font-bold text-base md:text-lg text-slate-800">
                    TravelPlanner
                  </span>
                </div>
                <div className="flex gap-4">
                  <button className="text-xs md:text-sm font-medium text-slate-600 hover:text-brand-600 transition-colors px-3 py-1.5 rounded-lg hover:bg-slate-50 border border-transparent hover:border-slate-100">
                    Войти
                  </button>
                </div>
              </div>
            </nav>

            {/* Content */}
            <div className="flex-1 overflow-hidden relative">
              {view === 'landing' ? (
                <LandingPage
                  scenario={scenario}
                  setScenario={setScenario}
                  onStart={() => setView('planner')}
                />
              ) : (
                <PlannerPage onBack={() => setView('landing')} />
              )}
            </div>
          </div>
        );
      }

      // --- LANDING PAGE ---
      function LandingPage({ scenario, setScenario, onStart }) {
        return (
          <div className="h-full overflow-y-auto bg-transparent flex flex-col relative z-0">
            {/* === Gradient Background === */}
            <div className="absolute top-0 left-0 w-full h-[800px] z-0 bg-gradient-to-b from-blue-200 via-blue-100/50 to-transparent pointer-events-none"></div>

            <div className="relative min-h-full flex flex-col">
              <div className="flex-1 max-w-4xl mx-auto px-4 md:px-6 pt-6 md:pt-32 relative z-10 pb-20">
                {/* SVG Container - Compact on mobile to fit screen */}
                <div className="flex justify-center mb-6 md:mb-12 h-auto max-w-full overflow-hidden md:overflow-visible px-4">
                  <div className="w-full max-w-[500px]">
                    <svg
                      width="100%"
                      height="auto"
                      viewBox="0 0 500 160"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                      className="drop-shadow-xl overflow-visible"
                    >
                      {/* Траектория */}
                      <path
                        d="M 60 120 Q 250 20 440 60"
                        stroke="white"
                        strokeWidth="3"
                        strokeDasharray="8 8"
                        strokeLinecap="round"
                        fill="none"
                        style={{ opacity: 0.8 }}
                      />

                      {/* Точка А */}
                      <g transform="translate(60, 120)">
                        <path
                          d="M0 0 C-10 -12 -15 -20 -15 -28 A 15 15 0 1 1 15 -28 C 15 -20 10 -12 0 0 Z"
                          fill="white"
                        />
                        <circle cx="0" cy="-28" r="5" fill="#0ea5e9" />
                        <text
                          x="-35"
                          y="-20"
                          fill="white"
                          fontWeight="bold"
                          fontSize="24"
                          fontFamily="Arial"
                        >
                          А
                        </text>
                      </g>

                      {/* Точка Б */}
                      <g transform="translate(440, 60)">
                        <path
                          d="M0 0 C-10 -12 -15 -20 -15 -28 A 15 15 0 1 1 15 -28 C 15 -20 10 -12 0 0 Z"
                          fill="white"
                        />
                        <circle cx="0" cy="-28" r="5" fill="#0ea5e9" />
                        <text
                          x="25"
                          y="-20"
                          fill="white"
                          fontWeight="bold"
                          fontSize="24"
                          fontFamily="Arial"
                        >
                          Б
                        </text>
                      </g>

                      {/* Самолет */}
                      <g transform="translate(270, 52) rotate(83) scale(2.5)">
                        <path
                          d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5v1.5l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"
                          fill="white"
                          transform="translate(-11, -11)"
                        />
                      </g>
                    </svg>
                  </div>
                </div>

                {/* Hero Container with mobile-first reordering */}
                <div className="flex flex-col">
                  {/* 1. Hero Title (Slogan) */}
                  <div className="text-center mb-6 md:mb-0 order-1">
                    <h1 className="text-2xl sm:text-3xl md:text-5xl font-extrabold text-slate-900 mb-4 md:mb-6 leading-tight">
                      Спланируй{' '}
                      <span className="text-brand-500">идеальное</span>{' '}
                      путешествие <br className="hidden md:block" />
                      за минуты
                    </h1>
                    {/* Desktop Description stays here */}
                    <p className="hidden md:block text-slate-500 text-xl max-w-2xl mx-auto mb-10">
                      Введи бюджет, выбери стиль планирования — и получи готовый
                      маршрут с перелётами, отелями и активностями.
                    </p>
                  </div>

                  {/* 2. Main Search Widget */}
                  <div className="bg-white rounded-2xl md:rounded-3xl shadow-xl shadow-slate-300/50 border border-slate-100 p-2 mb-6 md:mb-20 max-w-4xl mx-auto order-2 w-full">
                    <div className="flex p-1 bg-slate-50 rounded-xl md:rounded-2xl mb-4 md:mb-6 mx-2 md:mx-4 mt-2 md:mt-4 overflow-x-auto">
                      {['manual', 'random', 'ai'].map((s) => (
                        <button
                          key={s}
                          onClick={() => setScenario(s)}
                          className={`flex-1 py-2 px-3 md:px-0 whitespace-nowrap rounded-lg md:rounded-xl text-xs md:text-sm font-medium transition-all ${
                            scenario === s
                              ? 'bg-brand-500 text-white shadow-md'
                              : 'text-slate-500 hover:text-slate-700'
                          }`}
                        >
                          {s === 'manual'
                            ? 'Ручной'
                            : s === 'random'
                              ? 'Рекомендация'
                              : 'AI Ассистент'}
                        </button>
                      ))}
                    </div>

                    <div className="flex flex-col md:flex-row gap-3 md:gap-4 px-2 md:px-4 pb-4 md:pb-6 items-center">
                      {/* Inputs: flex-1 on desktop to share width equally */}
                      <div className="w-full md:flex-1 relative group">
                        <div className="absolute left-4 top-3.5 text-slate-400 group-focus-within:text-brand-500">
                          <Icon name="MapPin" size={18} />
                        </div>
                        <input
                          type="text"
                          placeholder="Откуда"
                          className="w-full pl-11 pr-4 py-3 bg-slate-50 rounded-xl md:rounded-2xl border-none focus:ring-2 focus:ring-brand-200 outline-none text-slate-800 font-medium text-sm md:text-base"
                        />
                      </div>
                      <div className="w-full md:flex-1 relative group">
                        <div className="absolute left-4 top-3.5 text-slate-400 group-focus-within:text-brand-500">
                          <Icon name="Calendar" size={18} />
                        </div>
                        <input
                          type="text"
                          placeholder="Даты"
                          className="w-full pl-11 pr-4 py-3 bg-slate-50 rounded-xl md:rounded-2xl border-none focus:ring-2 focus:ring-brand-200 outline-none text-slate-800 font-medium text-sm md:text-base"
                        />
                      </div>
                      {/* People field: Now a Select */}
                      <div className="w-full md:w-44 relative group">
                        <div className="absolute left-4 top-3.5 text-slate-400 group-focus-within:text-brand-500 z-10 pointer-events-none">
                          <Icon name="Users" size={18} />
                        </div>
                        <select
                          defaultValue="1 человек"
                          className="w-full pl-11 pr-10 py-3 bg-slate-50 rounded-xl md:rounded-2xl border-none focus:ring-2 focus:ring-brand-200 outline-none text-slate-800 font-medium text-sm md:text-base appearance-none cursor-pointer"
                        >
                          <option>1 человек</option>
                          <option>2 человека</option>
                          <option>3 человека</option>
                          <option>4 человека</option>
                          <option>Группа 5+</option>
                        </select>
                        <div className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                          <svg
                            width="12"
                            height="12"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            strokeWidth="3"
                            strokeLinecap="round"
                            strokeLinejoin="round"
                          >
                            <path d="m6 9 6 6 6-6" />
                          </svg>
                        </div>
                      </div>
                      {/* Start Button: fixed width on desktop */}
                      <button
                        onClick={onStart}
                        className="w-full md:w-auto md:min-w-[130px] md:shrink-0 px-6 h-12 bg-brand-500 hover:bg-brand-600 text-white rounded-xl md:rounded-2xl flex items-center justify-center shadow-lg shadow-brand-500/30 transition-transform active:scale-95 text-sm md:text-base font-bold uppercase tracking-wide"
                      >
                        Начать
                      </button>
                    </div>
                  </div>

                  {/* 3. Mobile Description - Moves after form */}
                  <div className="md:hidden text-center mb-16 order-3 px-4">
                    <p className="text-slate-500 text-sm sm:text-base leading-relaxed">
                      Введи бюджет, выбери стиль планирования — и получи готовый
                      маршрут с перелётами, отелями и активностями.
                    </p>
                  </div>
                </div>

                {/* 4. How It Works Section */}
                <div className="mb-16 md:mb-24">
                  <div className="text-center mb-8 md:mb-12">
                    <h3 className="text-xs md:text-sm font-bold text-brand-500 uppercase tracking-widest mb-2">
                      Процесс
                    </h3>
                    <h2 className="text-2xl md:text-4xl font-bold text-slate-900">
                      Как это работает
                    </h2>
                    <p className="text-slate-500 mt-3 text-sm md:text-lg">
                      Четыре простых шага от идеи до готового плана.
                    </p>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-8 md:gap-8 relative">
                    <div className="hidden md:block absolute top-12 left-[12%] right-[12%] h-0.5 bg-slate-100 -z-10"></div>

                    {STEPS.map((step) => (
                      <div
                        key={step.id}
                        className="flex flex-col items-center text-center px-4"
                      >
                        <div className="w-20 h-20 md:w-24 md:h-24 bg-white rounded-2xl md:rounded-3xl shadow-sm border border-slate-100 flex items-center justify-center mb-4 md:mb-6 relative z-10">
                          <div className="absolute -top-2 -right-2 md:-top-3 md:-right-3 w-7 h-7 md:w-8 md:h-8 bg-brand-500 rounded-full text-white flex items-center justify-center font-bold text-xs md:text-sm border-2 md:border-4 border-white shadow-sm">
                            {step.id}
                          </div>
                          <div className="text-brand-600">
                            <Icon
                              name={step.icon}
                              size={28}
                              className="md:w-8 md:h-8"
                            />
                          </div>
                        </div>
                        <h4 className="font-bold text-slate-900 text-base md:text-lg mb-2 md:mb-3">
                          {step.title}
                        </h4>
                        <p className="text-slate-500 text-xs md:text-sm leading-relaxed">
                          {step.desc}
                        </p>
                      </div>
                    ))}
                  </div>
                </div>

                {/* 5. FAQ Cards Section */}
                <div className="mt-16 md:mt-20 pb-16">
                  <div className="grid grid-cols-1 gap-8 md:gap-12">
                    {FAQ_CARDS.map((card, idx) => (
                      <div
                        key={card.id}
                        className={`flex flex-col md:flex-row bg-white rounded-2xl md:rounded-[2rem] overflow-hidden shadow-lg shadow-slate-200/50 border border-slate-100 min-h-0 md:min-h-[350px] ${idx % 2 !== 0 ? 'md:flex-row-reverse' : ''}`}
                      >
                        <div className="w-full md:w-1/2 h-52 sm:h-64 md:h-auto relative overflow-hidden">
                          <img
                            src={card.image}
                            alt={card.title}
                            className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 hover:scale-105"
                          />
                        </div>
                        <div className="w-full md:w-1/2 p-6 sm:p-8 md:p-12 flex flex-col justify-center">
                          <h4 className="text-xl md:text-3xl font-bold text-slate-800 mb-3 md:mb-5">
                            {card.title}
                          </h4>
                          <p className="text-slate-600 leading-relaxed text-sm md:text-xl">
                            {card.desc}
                          </p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div className="relative z-10 mt-auto bg-transparent">
                <Footer />
              </div>
            </div>
          </div>
        );
      }

      // --- PLANNER PAGE ---
      function PlannerPage({ onBack }) {
        const [nodes, setNodes] = useState([
          {
            id: 1,
            type: 'city',
            title: 'Москва',
            sub: 'Начало пути',
            icon: 'MapPin',
          },
          {
            id: 2,
            type: 'transport',
            title: 'Перелет S7',
            sub: '4ч 30м',
            icon: 'Plane',
            cost: '15 000 ₽',
          },
          {
            id: 3,
            type: 'city',
            title: 'Горно-Алтайск',
            sub: 'Прибытие',
            icon: 'MapPin',
          },
          {
            id: 4,
            type: 'hotel',
            title: 'Altai Palace',
            sub: '3 ночи',
            icon: 'Bed',
            cost: '32 000 ₽',
          },
        ]);

        return (
          <div className="flex flex-col md:flex-row h-full bg-white">
            {/* LEFT PANEL - Adjust height for mobile */}
            <div className="w-full md:w-[420px] lg:w-[480px] flex flex-col border-r border-slate-200 z-10 shadow-xl bg-white h-[45%] md:h-full overflow-hidden shrink-0">
              <div className="p-4 md:p-6 border-b border-slate-100">
                <button
                  onClick={onBack}
                  className="text-slate-400 hover:text-slate-600 mb-2 md:mb-4 flex items-center gap-1 text-sm"
                >
                  <Icon name="ArrowLeft" size={16} /> Назад
                </button>
                <h2 className="text-xl md:text-2xl font-bold text-slate-800">
                  Алтайский Трип
                </h2>
                <div className="flex gap-4 mt-2 text-xs md:text-sm text-slate-500">
                  <span className="flex items-center gap-1">
                    <Icon name="Calendar" size={14} /> 15-20 Окт
                  </span>
                  <span className="flex items-center gap-1">
                    <Icon name="Users" size={14} /> 2 чел
                  </span>
                </div>
              </div>

              <div className="flex-1 overflow-y-auto bg-slate-50 p-4">
                <div className="flex gap-2 mb-4 md:mb-6">
                  <button className="flex-1 bg-white border border-slate-200 p-2 rounded-xl text-xs md:text-sm font-medium text-slate-600 hover:border-brand-300 hover:text-brand-600 transition-colors flex items-center justify-center gap-2 shadow-sm">
                    <Icon name="RefreshCcw" size={16} /> Обновить
                  </button>
                  <button className="flex-1 bg-white border border-slate-200 p-2 rounded-xl text-xs md:text-sm font-medium text-slate-600 hover:border-brand-300 hover:text-brand-600 transition-colors flex items-center justify-center gap-2 shadow-sm">
                    <Icon name="Share2" size={16} /> Поделиться
                  </button>
                </div>

                <div className="space-y-0 relative pb-6">
                  <div className="absolute left-6 top-4 bottom-10 w-0.5 bg-slate-200 -z-0"></div>
                  {nodes.map((node) => (
                    <div
                      key={node.id}
                      className="relative z-10 pl-14 py-2 group"
                    >
                      <div
                        className={`absolute left-3 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full border-2 flex items-center justify-center bg-white ${node.type === 'transport' ? 'border-brand-400 text-brand-500' : 'border-slate-300 text-slate-400'}`}
                      >
                        <div className="w-1.5 h-1.5 rounded-full bg-current"></div>
                      </div>
                      <div className="bg-white p-3 md:p-4 rounded-xl md:rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-all cursor-pointer">
                        <div className="flex justify-between items-start">
                          <div className="flex items-center gap-3">
                            <div
                              className={`w-8 h-8 md:w-10 md:h-10 rounded-lg md:rounded-xl flex items-center justify-center ${node.type === 'transport' ? 'bg-brand-50 text-brand-600' : 'bg-slate-50 text-slate-500'}`}
                            >
                              <Icon name={node.icon} size={18} />
                            </div>
                            <div>
                              <div className="font-bold text-slate-800 text-sm md:text-base">
                                {node.title}
                              </div>
                              <div className="text-[10px] md:text-xs text-slate-500 font-medium">
                                {node.sub}
                              </div>
                            </div>
                          </div>
                          {node.cost && (
                            <div className="bg-slate-50 px-2 py-1 rounded-lg text-[10px] md:text-xs font-bold text-slate-700">
                              {node.cost}
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  ))}
                  <div className="pl-14 pt-4">
                    <div className="flex gap-2">
                      <button className="px-3 md:px-4 py-2 bg-slate-800 text-white text-[10px] md:text-xs font-bold rounded-lg md:rounded-xl flex items-center gap-2 hover:bg-slate-700 shadow-lg shadow-slate-900/20">
                        <Icon name="Plus" size={14} /> Точка
                      </button>
                      <div className="flex gap-1">
                        {['Bed', 'Plane', 'Utensils'].map((i) => (
                          <button
                            key={i}
                            className="w-7 h-7 md:w-8 md:h-8 rounded-lg border border-slate-200 bg-white flex items-center justify-center text-slate-400 hover:text-brand-500 hover:border-brand-200"
                          >
                            <Icon name={i} size={12} />
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* RIGHT PANEL - MAP - Full height on MD, bottom half on mobile */}
            <div className="flex-1 map-bg relative min-h-0">
              <div className="absolute inset-0 opacity-20 pointer-events-none">
                <svg className="w-full h-full">
                  <pattern
                    id="grid"
                    width="40"
                    height="40"
                    patternUnits="userSpaceOnUse"
                  >
                    <path
                      d="M 40 0 L 0 0 0 40"
                      fill="none"
                      stroke="gray"
                      strokeWidth="0.5"
                    />
                  </pattern>
                  <rect width="100%" height="100%" fill="url(#grid)" />
                </svg>
              </div>
              <div className="absolute inset-0 flex items-center justify-center pointer-events-none px-4">
                <div className="text-center">
                  <div className="inline-block p-3 md:p-4 bg-white rounded-full shadow-xl mb-4 text-brand-500 animate-bounce pointer-events-auto">
                    <Icon name="Map" size={24} className="md:w-8 md:h-8" />
                  </div>
                  <h3 className="text-base md:text-xl font-bold text-slate-400 uppercase tracking-wide">
                    Mapbox Integration
                  </h3>
                  <p className="text-xs md:text-sm text-slate-400">
                    Интерактивная карта маршрута
                  </p>
                </div>
              </div>
              <div className="absolute top-4 right-4 flex gap-2">
                <button className="bg-white p-2 md:p-3 rounded-xl shadow-lg text-slate-600 hover:text-brand-500 transition-colors">
                  <Icon name="Save" size={18} />
                </button>
                <button className="bg-white p-2 md:p-3 rounded-xl shadow-lg text-slate-600 hover:text-brand-500 transition-colors">
                  <Icon name="Share2" size={18} />
                </button>
              </div>
            </div>
          </div>
        );
      }

      // --- Footer ---
      function Footer() {
        return (
          <footer className="border-t border-slate-200 py-8 md:py-10 shrink-0 relative bg-white/50 backdrop-blur-sm px-4">
            <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-left">
              <div className="flex flex-col items-center md:items-start gap-1">
                <span className="font-bold text-lg md:text-xl text-slate-900 tracking-tight">
                  TravelPlanner
                </span>
                <span className="text-xs text-slate-400">
                  Спланируй мечту © 2026
                </span>
              </div>
              <div className="flex gap-6 md:gap-8 text-sm md:text-base text-slate-600 font-medium">
                <a href="#" className="hover:text-brand-600 transition-colors">
                  О сервисе
                </a>
                <a href="#" className="hover:text-brand-600 transition-colors">
                  Контакты
                </a>
              </div>
              <div className="flex items-center gap-5 text-slate-400">
                <a href="#" className="hover:text-brand-600 transition-colors">
                  <Icon name="Mail" size={20} />
                </a>
              </div>
            </div>
          </footer>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
