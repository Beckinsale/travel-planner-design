<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelPlanner</title>

    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://images.pexels.com" />

    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                sky: '#0ea5e9', // Возвращаем яркий небесно-голубой
                indigo: '#1e1b4b', // Глубокий синий
                amber: '#f59e0b', // Янтарный акцент
                light: '#f0f9ff', // Светло-голубой для элементов
                bg: '#f0f6ff', // Твой новый цвет для фона
              },
            },
          },
        },
      };
    </script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-white text-slate-900 antialiased">
    <div id="root"></div>

    <!-- Components -->
    <script type="text/babel" src="icons.js"></script>
    <script type="text/babel" src="components/LandingPage.js"></script>
    <script type="text/babel" src="components/RecommendationsPage.js"></script>
    <script type="text/babel" src="components/PlannerPage.js"></script>
    <script type="text/babel" src="components/AIAssistantPage.js"></script>
    <script type="text/babel" src="components/ProfilePage.js"></script>

    <!-- Main App -->
    <script type="text/babel" src="App.js"></script>
  </body>
</html>
