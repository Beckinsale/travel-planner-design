<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelPlanner</title>

    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                400: '#38bdf8',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
              },
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      };
    </script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: 'Inter', sans-serif;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }

      .map-bg {
        background-color: #f8fafc;
        background-image: radial-gradient(#e2e8f0 1.5px, transparent 1.5px);
        background-size: 24px 24px;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes floatEffect {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      .pin-float {
        animation: floatEffect 4s ease-in-out infinite;
      }
    </style>
  </head>
  <body class="bg-white text-slate-900 antialiased min-h-screen flex flex-col">
    <div id="root" class="flex flex-col min-h-screen"></div>

    <script type="text/babel">
      const { useState, useRef } = React;

      // --- Icons Dictionary ---

        Plane: (props) => (
          <svg

          >
            <line x1="4" x2="4" y1="21" y2="14" />

            <line x1="12" x2="12" y1="8" y2="3" />
            <line x1="20" x2="20" y1="21" y2="16" />
            <line x1="20" x2="20" y1="12" y2="3" />
            <line x1="1" x2="7" y1="14" y2="14" />
            <line x1="9" x2="15" y1="8" y2="8" />

        ),
        ExternalLink: (props) => (
          <svg

        RefreshCw: (props) => (

          </svg>
        ),
        Clock: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
        ),
        CreditCard: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <rect width="20" height="14" x="2" y="5" rx="2" />
            <line x1="2" x2="22" y1="10" y2="10" />
          </svg>
        ),
        Globe2: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M21.54 15H17a2 2 0 0 0-2 2v4.54" />
            <path d="M7 3.34V5a3 3 0 0 0 3 3v0a2 2 0 0 1 2 2v0c0 1.1.9 2 2 2h0a2 2 0 0 0 2-2v0a2 2 0 0 1 2-2h3.17" />
            <path d="M11 21.95V18a2 2 0 0 0-2-2v0a2 2 0 0 1-2-2v-1a2 2 0 0 0-2-2H2.05" />
            <circle cx="12" cy="12" r="10" />
          </svg>
        ),
        User: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        ),
        Settings: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />

        ),
        Mic: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"

            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" x2="12" y1="19" y2="23" />
            <line x1="8" x2="16" y1="23" y2="23" />
          </svg>
        ),
        Send: (props) => (
          <svg
            {...props}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"

            strokeLinejoin="round"

      const Icon = ({ name, size = 20, className }) => {
        const IconComponent = LucideIcons[name];
        if (!IconComponent) return null;
        return (
          <IconComponent width={size} height={size} className={className} />
        );
      };

      const STEPS = [
        {
          id: 1,
          title: 'Задай параметры',
          desc: 'Введи бюджет, город отправления, даты и количество путешественников.',
          icon: 'Target',
        },
        {
          id: 2,
          title: 'Собери маршрут',
          desc: 'Система предложит варианты или ты соберёшь маршрут вручную из точек.',
          icon: 'Sliders',
        },
        {
          id: 3,
          title: 'Визуализируй',
          desc: 'Все точки появятся на интерактивной карте с таймлайном и бюджетом.',
          icon: 'Map',
        },
        {
          id: 4,
          title: 'Бронируй',
          desc: 'Когда план готов, переходи по ссылкам к сервисам для бронирования.',
          icon: 'Plane',
        },
      ];

      const FAQ_CARDS = [
        {
          id: 1,
          title: 'Как работает сервис рекомендаций?',
          desc: 'Наш AI анализирует тысячи направлений, учитывая ваш бюджет и интересы. Просто укажите сумму, и мы покажем, куда можно улететь и хорошо отдохнуть.',
          image:
            'https://images.unsplash.com/photo-1524850011238-e3d235c7d4c9?q=80&w=2064&auto=format&fit=crop',
        },
        {
          id: 2,
          title: 'Можно ли путешествовать с детьми?',
          desc: "Конечно! В настройках можно включить фильтр 'Семейный отдых'. Мы подберем отели с детскими клубами и маршруты без сложных пересадок.",
          image:
            'https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=2070&auto=format&fit=crop',
        },
        {
          id: 3,
          title: 'Какие страны доступны?',
          desc: 'Мы работаем с глобальными базами данных авиабилетов и отелей. Вы можете спланировать путешествие практически в любую точку мира, от Азии до Латинской Америки.',
          image:
            'https://images.unsplash.com/photo-1503220317375-aaad61436b1b?q=80&w=2070&auto=format&fit=crop',
        },
        {
          id: 4,
          title: 'Сервис бесплатный?',
          desc: 'Базовое планирование полностью бесплатно. У нас есть PRO-подписка для сложных мульти-маршрутов и сохранения истории поездок в облаке.',
          image:
            'https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=2071&auto=format&fit=crop',
        },
      ];

      function App() {
        const [view, setView] = useState('landing');
        const [scenario, setScenario] = useState('manual');

        const handleStart = () => {
          if (scenario === 'manual') {
            setView('planner');
          } else if (scenario === 'ai') {
            setView('ai-assistant');
          } else {
            setView('recommendations');
          }
        };

        return (
          <div className="flex flex-col min-h-screen bg-white">
            {/* Скрываем стандартный хедер на страницах с боковой панелью */}
            {view !== 'ai-assistant' && view !== 'profile' && (
              <nav className="sticky top-0 z-50 bg-white/95 backdrop-blur-xl border-b border-slate-100 h-16 shrink-0">
                <div className="max-w-4xl mx-auto px-4 md:px-6 h-full flex justify-between items-center w-full">
                  <div
                    className="flex items-center gap-2 cursor-pointer"
                    onClick={() => setView('landing')}
                  >
                    <div className="bg-brand-500 text-white p-1.5 rounded-lg shrink-0">
                      <Icon name="Map" size={20} />
                    </div>
                    <span className="font-bold text-lg text-slate-800 tracking-tight whitespace-nowrap">
                      TravelPlanner
                    </span>
                  </div>
                  <button className="text-sm font-medium text-slate-600 hover:text-brand-600 transition-all px-3 py-1.5 rounded-lg hover:bg-slate-50 border border-transparent hover:border-slate-100">
                    Войти
                  </button>
                </div>
              </nav>
            )}

            <main className="flex-1 w-full flex flex-col overflow-hidden relative">
              {view === 'landing' && (
                <div className="overflow-y-auto h-full">
                  <LandingPage
                    scenario={scenario}
                    setScenario={setScenario}
                    onStart={handleStart}
                  />
                </div>
              )}
              {view === 'planner' && (
                <div className="overflow-y-auto h-full">
                  <PlannerPage onBack={() => setView('landing')} />
                </div>
              )}
              {view === 'recommendations' && (
                <RecommendationsPage onBack={() => setView('landing')} />
              )}
              {view === 'ai-assistant' && (
                <AIAssistantPage
                  onBack={() => setView('landing')}
                  onProfile={() => setView('profile')}
                />
              )}
              {view === 'profile' && (
                <ProfilePage
                  onBack={() => setView('landing')}
                  onChat={() => setView('ai-assistant')}
                />
              )}
            </main>

            {view !== 'ai-assistant' && view !== 'profile' && (
              <footer
                className={`mt-auto border-t border-slate-100 bg-white py-8 shrink-0 relative z-20 ${view === 'landing' ? '' : 'hidden md:block'}`}
              >
                <div className="max-w-4xl mx-auto px-4 md:px-6 flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-left w-full">
                  <div className="flex flex-col items-center md:items-start gap-0.5">
                    <span className="font-bold text-lg md:text-xl text-slate-900 tracking-tight leading-tight">
                      TravelPlanner
                    </span>
                    <span className="text-[10px] md:text-xs text-slate-400 font-medium">
                      Спланируй мечту © 2026
                    </span>
                  </div>
                  <div className="flex gap-8 text-[13px] md:text-sm text-slate-600 font-semibold">
                    <a
                      href="#"
                      className="hover:text-brand-600 transition-colors"
                    >
                      О сервисе
                    </a>
                    <a
                      href="#"
                      className="hover:text-brand-600 transition-colors whitespace-nowrap"
                    >
                      Контакты
                    </a>
                  </div>
                  <a
                    href="mailto:contact@travelplanner.com"
                    className="text-slate-400 hover:text-brand-600 transition-all p-2.5 bg-slate-50 rounded-xl hover:bg-brand-50 shrink-0"
                  >
                    <Icon name="Mail" size={18} />
                  </a>
                </div>
              </footer>
            )}
          </div>
        );
      }

      function LandingPage({ scenario, setScenario, onStart }) {
        // Состояния для кастомного селектора количества человек
        const [isSelectOpen, setIsSelectOpen] = useState(false);
        const [selectedPeople, setSelectedPeople] = useState('1 человек');

        const peopleOptions = [
          '1 человек',
          '2 человека',
          '3 человека',
          '4 человека',
          'Группа 5+',
        ];

        return (
          <div className="relative flex flex-col min-h-full">
            {/* Фоновый градиент */}
            <div className="absolute top-0 left-0 w-full h-[800px] bg-gradient-to-b from-blue-100 via-blue-50/30 to-transparent pointer-events-none z-0"></div>

            <div className="relative z-10 max-w-4xl mx-auto px-4 md:px-6 pt-6 md:pt-32 pb-10 md:pb-20 w-full">
              {/* SVG Иллюстрация */}
              <div className="flex justify-center mb-6 md:mb-12 h-auto max-w-full overflow-visible px-4">
                <div className="w-full max-w-[500px]">
                  <svg
                    width="500"
                    height="160"
                    viewBox="0 0 500 160"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                    className="drop-shadow-xl overflow-visible w-full h-auto"
                  >
                    <path
                      d="M 60 120 Q 250 20 440 60"
                      stroke="white"
                      strokeWidth="3"
                      strokeDasharray="8 8"
                      strokeLinecap="round"
                      fill="none"
                      style={{ opacity: 0.8 }}
                    ></path>

            price: '72 000 ₽',
            time: '12ч 10м',
          },
          {
            id: 3,
            route: 'Алматы → Тбилиси → Батуми',
            price: '48 000 ₽',
            time: '6ч 15м',
          },
          {
            id: 4,
            route: 'Ереван → Рим → Милан',
            price: '60 000 ₽',
            time: '8ч 45м',
          },
          {
            id: 5,
            route: 'Стамбул → Париж → Лиссабон',
            price: '85 000 ₽',
            time: '14ч 20м',
          },
        ];

        // Логика шторки
        const [sheetHeight, setSheetHeight] = useState(60);
        const [isDragging, setIsDragging] = useState(false);
        const startY = useRef(0);
        const startHeight = useRef(0);

        const handleTouchStart = (e) => {
          setIsDragging(true);
          startY.current = e.touches[0].clientY;
          startHeight.current = sheetHeight;
        };

        const handleTouchMove = (e) => {
          if (!isDragging) return;
          const currentY = e.touches[0].clientY;
          const deltaY = startY.current - currentY;
          const windowHeight = window.innerHeight;
          const deltaPercent = (deltaY / windowHeight) * 100;
          let newHeight = startHeight.current + deltaPercent;

          if (newHeight < 20) newHeight = 20;
          if (newHeight > 95) newHeight = 95;
          setSheetHeight(newHeight);
        };

        const handleTouchEnd = () => setIsDragging(false);

        return (
          <div className="w-full h-[calc(100vh-4rem)] flex flex-col md:flex-row bg-white relative overflow-hidden md:overflow-visible">
            {/* КАРТА (ФОН) */}
            <div className="absolute inset-0 h-full md:relative md:h-full md:sticky md:top-16 md:flex-1 order-1 md:order-2 border-l border-slate-100 map-bg group z-0">

                    КАРТА РЕКОМЕНДАЦИЙ

                    Визуализация выбранного маршрута
                  </p>
                </div>
              </div>

              {/* Кнопки зума (только десктоп) */}
              <div className="hidden md:flex absolute bottom-6 right-6 flex flex-col gap-2">
                <button className="w-9 h-9 bg-white rounded-xl shadow-lg border border-slate-100 flex items-center justify-center text-slate-600 hover:text-brand-500 transition-all active:scale-90">
                  <Icon name="Plus" size={16} />
                </button>
                <button className="w-9 h-9 bg-white rounded-xl shadow-lg border border-slate-100 flex items-center justify-center text-slate-600 hover:text-brand-500 transition-all active:scale-90 font-black">
                  —
                </button>
              </div>
            </div>

            {/* ШТОРКА С РЕКОМЕНДАЦИЯМИ */}
            <div
              className="absolute bottom-0 w-full md:static md:h-auto md:w-[420px] lg:w-[480px] order-2 md:order-1 flex flex-col bg-white z-10 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.2)] md:shadow-xl md:border-r border-slate-200 rounded-t-[2.5rem] md:rounded-none md:min-h-full transition-height duration-75 ease-out"
              style={{
                height: window.innerWidth < 768 ? `${sheetHeight}%` : 'auto',
              }}
            >
              {/* Хедер шторки (Зона для перетаскивания) */}
              <div className="w-full pt-3 pb-1 shrink-0 bg-white rounded-t-[2.5rem] md:rounded-none border-b border-slate-50">
                {/* Ручка для перетаскивания (только моб) */}
                <div
                  className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-2 md:hidden cursor-grab active:cursor-grabbing touch-none"

                  <button
                    onClick={onBack}
                    className="text-slate-400 hover:text-slate-600 flex items-center gap-1 text-sm font-medium transition-colors"
                  >
                    <Icon name="ArrowLeft" size={16} /> Назад
                  </button>
                  <div className="flex gap-4 text-xs md:text-sm text-slate-500 font-bold uppercase tracking-wider">
                    <span className="flex items-center gap-1">
                      <Icon name="Calendar" size={14} /> 15-20 Окт
                    </span>
                  </div>
                </div>
              </div>

              {/* Контент списка */}
              <div className="flex-1 overflow-y-auto bg-slate-50 p-4 space-y-4 rounded-b-none md:rounded-none">
                <h2 className="text-xl font-bold text-slate-900 px-2 mb-2 hidden md:block">
                  Рекомендуемые
                </h2>

                {recommendations.map((rec) => (
                  <div

          </div>
        );

                      <Icon name="Plus" size={16} />

                    <button className="w-9 h-9 bg-white rounded-xl shadow-lg border border-slate-100 flex items-center justify-center text-slate-600 hover:text-brand-500 transition-all active:scale-90 font-black">
                      —
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // --- AI ASSISTANT PAGE ---
      function AIAssistantPage({ onBack, onProfile }) {
        const [messages, setMessages] = useState([
          {
            id: 1,
            type: 'bot',
            text: 'Привет! Я твой AI-ассистент по путешествиям. Куда бы ты хотел отправиться?',
          },
          { id: 2, type: 'user', text: 'Хочу в горы, где-нибудь в Европе.' },
          {
            id: 3,
            type: 'bot',
            text: 'Отличный выбор! Как насчет Альп? Вот несколько вариантов:',
            options: ['Швейцария', 'Австрия', 'Италия'],
          },
        ]);

        const [sheetHeight, setSheetHeight] = useState(60);
        const [isDragging, setIsDragging] = useState(false);
        const startY = useRef(0);
        const startHeight = useRef(0);

        const handleTouchStart = (e) => {
          setIsDragging(true);
          startY.current = e.touches[0].clientY;
          startHeight.current = sheetHeight;
        };

        const handleTouchMove = (e) => {
          if (!isDragging) return;
          const currentY = e.touches[0].clientY;
          const deltaY = startY.current - currentY;
          const windowHeight = window.innerHeight;
          const deltaPercent = (deltaY / windowHeight) * 100;
          let newHeight = startHeight.current + deltaPercent;
          if (newHeight < 20) newHeight = 20;
          if (newHeight > 90) newHeight = 90;
          setSheetHeight(newHeight);
        };

        const handleTouchEnd = () => {
          setIsDragging(false);
        };

        return (
          <div className="flex flex-col h-screen bg-white overflow-hidden">
            {/* --- HEADER AREA (FIXED WIDTH) --- */}
            <nav className="z-50 bg-white border-b border-slate-100 h-16 shrink-0">
              {/* Контейнер теперь max-w-4xl как на главной */}
              <div className="max-w-4xl mx-auto px-4 md:px-6 h-full flex justify-between items-center w-full">
                <div
                  className="flex items-center gap-2 cursor-pointer"
                  onClick={onBack}
                >
                  <div className="bg-brand-500 text-white p-1.5 rounded-lg shrink-0">
                    <Icon name="Map" size={20} />
                  </div>
                  <span className="font-bold text-lg text-slate-800 tracking-tight whitespace-nowrap">
                    TravelPlanner
                  </span>
                </div>

                <div className="flex items-center gap-3">
                  <button
                    onClick={onProfile}
                    className="p-2 text-slate-400 hover:text-brand-500 hover:bg-slate-50 rounded-xl transition-all"
                  >
                    <Icon name="User" size={22} />
                  </button>
                </div>
              </div>
            </nav>

            {/* --- MAIN CONTENT AREA --- */}
            <div className="flex-1 flex flex-col md:flex-row overflow-hidden relative">
              {/* Боковая панель (Desktop) */}
              <div className="hidden md:flex flex-col w-16 bg-white border-r border-slate-100 items-center py-6 space-y-6 shrink-0">
                <div className="flex-1 flex flex-col space-y-4">
                  <button
                    className="p-2 bg-brand-500 text-white rounded-lg shadow-lg shadow-brand-500/20"
                    onClick={onProfile}
                  >
                    <Icon name="User" size={24} />
                  </button>
                  <button className="p-2 text-slate-400 hover:text-brand-600 hover:bg-slate-50 rounded-lg transition-colors">
                    <Icon name="Globe2" size={24} />
                  </button>
                </div>
                <button className="p-2 text-slate-400 hover:text-brand-600 hover:bg-slate-50 rounded-lg transition-colors">
                  <Icon name="Settings" size={24} />
                </button>
              </div>

              {/* КАРТА (ФОН) */}
              <div className="absolute inset-0 h-full md:relative md:order-2 md:flex-1 border-l border-slate-100 map-bg group z-0">
                <div className="absolute inset-0 flex items-start md:items-center justify-center pt-[10vh] md:pt-0 pointer-events-none px-4">
                  <div className="text-center transform transition-transform group-hover:scale-105 pointer-events-auto">
                    <div className="w-14 h-14 bg-brand-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-xl animate-bounce border-4 border-white">
                      <Icon name="Map" size={28} />
                    </div>
                    <h3 className="text-lg md:text-2xl font-black text-slate-400 uppercase tracking-[0.2em] select-none text-center">
                      ИНТЕРАКТИВНАЯ КАРТА
                    </h3>
                    <p className="text-xs md:text-sm text-slate-400 mt-2 font-medium max-w-[280px] mx-auto text-center leading-relaxed">
                      Локации из чата появятся здесь
                    </p>
                  </div>
                </div>
              </div>

              {/* ШТОРКА ЧАТА */}
              <div
                className="absolute bottom-0 w-full md:static md:h-full md:w-[420px] lg:w-[480px] md:order-1 flex flex-col bg-white z-10 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.2)] md:shadow-none rounded-t-[2.5rem] md:rounded-none transition-height duration-75 ease-out"
                style={{
                  height: window.innerWidth < 768 ? `${sheetHeight}%` : 'auto',
                }}
              >
                <div
                  className="w-full pt-3 pb-1 shrink-0 md:hidden cursor-grab active:cursor-grabbing touch-none flex justify-center bg-white rounded-t-[2.5rem]"
                  onTouchStart={handleTouchStart}
                  onTouchMove={handleTouchMove}
                  onTouchEnd={handleTouchEnd}
                >
                  <div className="w-12 h-1.5 bg-slate-200 rounded-full"></div>
                </div>

                <div className="px-4 md:px-6 py-2 border-b border-slate-50 flex items-center justify-between shrink-0">
                  <button
                    onClick={onBack}
                    className="text-slate-400 hover:text-slate-600 flex items-center gap-1 text-sm font-medium transition-colors"
                  >
                    <Icon name="ArrowLeft" size={16} /> Назад
                  </button>
                  <div className="flex items-center gap-2">
                    <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                      AI Ассистент
                    </span>
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 bg-slate-50/30 md:bg-white">
                  {messages.map((msg) => (
                    <div
                      key={msg.id}
                      className={`flex flex-col ${msg.type === 'user' ? 'items-end' : 'items-start'}`}
                    >
                      <div
                        className={`p-3 md:p-4 rounded-2xl max-w-[85%] md:max-w-[75%] shadow-sm text-sm md:text-base ${msg.type === 'user' ? 'bg-white text-slate-800 border border-slate-100 rounded-tr-none' : 'bg-brand-500 text-white rounded-tl-none'}`}
                      >
                        <p>{msg.text}</p>
                      </div>
                      {msg.options && (
                        <div className="flex flex-wrap gap-2 mt-3 ml-2">
                          {msg.options.map((option, index) => (
                            <button
                              key={index}
                              className="bg-white text-brand-600 text-xs md:text-sm font-bold py-2 px-4 rounded-xl border border-brand-100 shadow-sm hover:bg-brand-50 transition-all active:scale-95"
                            >
                              {option}
                            </button>
                          ))}
                        </div>
                      )}
                    </div>
                  ))}
                </div>

                <div className="p-4 md:p-6 bg-white border-t border-slate-100 shrink-0">
                  <div className="max-w-3xl mx-auto relative flex items-center">
                    <input
                      type="text"
                      placeholder="Напишите сообщение..."
                      className="w-full pl-5 pr-24 py-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-brand-200 outline-none text-slate-800 font-medium text-sm md:text-base transition-all"
                    />
                    <div className="absolute right-2 flex space-x-1">
                      <button className="p-2.5 text-slate-400 hover:text-brand-600 rounded-xl transition-colors">
                        <Icon name="Mic" size={20} />
                      </button>
                      <button className="p-2.5 bg-brand-500 text-white rounded-xl hover:bg-brand-600 transition-all shadow-lg shadow-brand-500/20 active:scale-90">
                        <Icon name="Send" size={20} />
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // --- PROFILE PAGE ---
      function ProfilePage({ onBack, onChat }) {
        const [activeTab, setActiveTab] = useState('routes');
        const [sheetHeight, setSheetHeight] = useState(60);
        const [isDragging, setIsDragging] = useState(false);
        const startY = useRef(0);
        const startHeight = useRef(0);

        const handleTouchStart = (e) => {
          setIsDragging(true);
          startY.current = e.touches[0].clientY;
          startHeight.current = sheetHeight;
        };

        const handleTouchMove = (e) => {
          if (!isDragging) return;
          const currentY = e.touches[0].clientY;
          const deltaY = startY.current - currentY;
          const windowHeight = window.innerHeight;
          const deltaPercent = (deltaY / windowHeight) * 100;
          let newHeight = startHeight.current + deltaPercent;
          if (newHeight < 20) newHeight = 20;
          if (newHeight > 90) newHeight = 90;
          setSheetHeight(newHeight);
        };

        const handleTouchEnd = () => setIsDragging(false);

        return (
          <div className="flex flex-col h-screen bg-white overflow-hidden">
            {/* --- HEADER AREA (FIXED WIDTH) --- */}
            <nav className="z-50 bg-white border-b border-slate-100 h-16 shrink-0">
              <div className="max-w-4xl mx-auto px-4 md:px-6 h-full flex justify-between items-center w-full">
                <div
                  className="flex items-center gap-2 cursor-pointer"
                  onClick={onBack}
                >
                  <div className="bg-brand-500 text-white p-1.5 rounded-lg shrink-0">
                    <Icon name="Map" size={20} />
                  </div>
                  <span className="font-bold text-lg text-slate-800 tracking-tight whitespace-nowrap">
                    TravelPlanner
                  </span>
                </div>

                <div className="flex items-center gap-3">
                  <button className="p-2 text-brand-500 bg-brand-50 rounded-xl transition-all">
                    <Icon name="User" size={22} />
                  </button>
                </div>
              </div>
            </nav>

            {/* --- MAIN CONTENT AREA --- */}
            <div className="flex-1 flex flex-col md:flex-row overflow-hidden relative">
              {/* Боковая панель (Desktop) */}
              <div className="hidden md:flex flex-col w-16 bg-white border-r border-slate-100 items-center py-6 space-y-6 shrink-0 z-20 relative">
                <div
                  className="bg-slate-50 text-slate-400 p-1.5 rounded-lg cursor-pointer hover:text-brand-500 transition-colors"
                  onClick={onBack}
                >
                  <Icon name="Map" size={20} />
                </div>
                <div className="flex-1 flex flex-col space-y-4 mt-4">
                  <button className="p-2 bg-brand-500 text-white rounded-lg shadow-lg shadow-brand-500/20">
                    <Icon name="User" size={24} />
                  </button>
                  <button
                    className="p-2 text-slate-400 hover:text-brand-600 hover:bg-slate-50 rounded-lg transition-colors"
                    onClick={onChat}
                  >
                    <Icon name="Globe2" size={24} />
                  </button>
                </div>
                <button className="p-2 text-slate-400 hover:text-brand-600 hover:bg-slate-50 rounded-lg transition-colors">
                  <Icon name="Settings" size={24} />
                </button>
              </div>

              {/* Мобильная навигация (Назад в чат) */}
              <div className="md:hidden absolute top-4 left-4 z-20 flex items-center justify-between pointer-events-none">
                <div
                  className="bg-brand-500 text-white p-2 rounded-xl cursor-pointer pointer-events-auto shadow-lg active:scale-95 transition-transform"
                  onClick={onChat}
                >
                  <Icon name="ArrowLeft" size={20} />
                </div>
              </div>

              {/* КАРТА (ФОН) */}
              <div className="absolute inset-0 h-full md:relative md:order-2 md:flex-1 border-l border-slate-100 map-bg z-0 overflow-hidden group">
                <div className="absolute inset-0 flex items-start md:items-center justify-center pt-[10vh] md:pt-0 pointer-events-none px-4">
                  <div className="text-center transform transition-transform group-hover:scale-105 pointer-events-auto">
                    <div className="w-14 h-14 bg-brand-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-xl animate-bounce border-4 border-white">
                      <Icon name="Map" size={28} />
                    </div>
                    <h3 className="text-lg md:text-2xl font-black text-slate-400 uppercase tracking-[0.2em] select-none text-center">
                      КАРТА ПРОФИЛЯ
                    </h3>
                    <p className="text-xs md:text-sm text-slate-400 mt-2 font-medium max-w-[280px] mx-auto text-center leading-relaxed">
                      История ваших перемещений и сохраненные локации
                    </p>
                  </div>
                </div>
              </div>

              {/* ШТОРКА ПРОФИЛЯ */}
              <div
                className="absolute bottom-0 w-full md:static md:h-full md:w-[500px] md:order-1 flex flex-col bg-white z-10 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.2)] md:shadow-none rounded-t-[2.5rem] md:rounded-none transition-height duration-75 ease-out"
                style={{
                  height: window.innerWidth < 768 ? `${sheetHeight}%` : 'auto',
                }}
              >
                {/* Зона перетаскивания (только моб) */}
                <div
                  className="w-full pt-3 pb-1 md:hidden cursor-grab active:cursor-grabbing touch-none flex justify-center shrink-0 bg-white rounded-t-[2.5rem]"
                  onTouchStart={handleTouchStart}
                  onTouchMove={handleTouchMove}
                  onTouchEnd={handleTouchEnd}
                >
                  <div className="w-12 h-1.5 bg-slate-200 rounded-full"></div>
                </div>

                <div className="flex-1 overflow-y-auto p-6 md:p-10 flex flex-col">
                  <div className="flex items-center justify-between mb-8">
                    <h1 className="text-2xl font-extrabold text-slate-900 hidden md:block">
                      Профиль
                    </h1>
                    <button
                      onClick={onBack}
                      className="text-slate-400 hover:text-slate-600 flex items-center gap-1 text-sm font-medium transition-colors md:hidden"
                    >
                      <Icon name="ArrowLeft" size={16} /> Выход
                    </button>
                  </div>

                  {/* Инфо пользователя */}
                  <div className="flex flex-col items-center md:items-start mb-10">
                    <div className="w-24 h-24 md:w-20 md:h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4 border-4 border-white shadow-sm">
                      <Icon name="User" size={40} className="text-slate-300" />
                    </div>
                    <h2 className="text-xl font-bold text-slate-800">
                      Иван Иванов
                    </h2>
                    <p className="text-sm text-slate-400 font-medium">
                      Путешественник с 2026 года
                    </p>
                  </div>

                  {/* Табы */}
                  <div className="flex p-1 bg-slate-50 rounded-2xl mb-6">
                    <button
                      onClick={() => setActiveTab('routes')}
                      className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'routes' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}`}
                    >
                      Маршруты
                    </button>
                    <button
                      onClick={() => setActiveTab('saved')}
                      className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'saved' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}`}
                    >
                      Сохраненное
                    </button>
                  </div>

                  {/* Карточка контента */}
                  <div className="flex-1 min-h-[250px] bg-slate-50 rounded-[2rem] border border-slate-100 relative group overflow-hidden">
                    <div className="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                      <button className="w-8 h-8 bg-white/80 backdrop-blur rounded-lg flex items-center justify-center shadow-sm text-slate-400 hover:text-brand-500">
                        <Icon name="ArrowLeft" size={14} />
                      </button>
                      <button className="w-8 h-8 bg-white/80 backdrop-blur rounded-lg flex items-center justify-center shadow-sm text-slate-400 hover:text-brand-500 transform rotate-180">
                        <Icon name="ArrowLeft" size={14} />
                      </button>
                    </div>
                    <div className="absolute inset-0 flex items-center justify-center text-slate-300 text-sm font-medium italic">
                      {activeTab === 'routes'
                        ? 'Нет активных маршрутов'
                        : 'Список пуст'}
                    </div>
                  </div>

                  <button className="mt-8 w-full py-4 bg-brand-500 text-white rounded-2xl font-bold shadow-lg shadow-brand-500/20 hover:bg-brand-600 transition-all active:scale-95">
                    НОВОЕ ПУТЕШЕСТВИЕ
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
